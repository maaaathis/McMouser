<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86CE62"/>
      <stop offset="0.5" stop-color="#5C9B46"/>
      <stop offset="1" stop-color="#3C6A31"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- macOS style rounded app tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#tile)"/>
  <!-- glossy top highlight -->
  <rect x="16" y="16" width="480" height="232" rx="108" fill="url(#gloss)"/>
  <!-- inner bezel -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4"/>

  <!-- pixel accents (Minecraft blocks) -->
  <g fill="#ffffff" fill-opacity="0.16">
    <rect x="372" y="118" width="30" height="30"/>
    <rect x="408" y="118" width="30" height="30"/>
    <rect x="408" y="154" width="30" height="30"/>
  </g>

  <!-- cursor: soft drop shadow -->
  <path d="M162,107 L162,395 L234,329 L276,431 L318,413 L276,317 L366,317 Z"
        fill="#000000" fill-opacity="0.22"/>
  <!-- cursor: white arrow with dark outline -->
  <path d="M150,95 L150,383 L222,317 L264,419 L306,401 L264,305 L354,305 Z"
        fill="#ffffff" stroke="#23351B" stroke-width="16" stroke-linejoin="round"/>
</svg>
